name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore SharedDesksBooking/SharedDesksBooking.sln
      
    - name: Build
      run: dotnet build SharedDesksBooking/SharedDesksBooking.sln --no-restore
      
    - name: Test
      run: dotnet test SharedDesksBooking/SharedDesksBooking.sln --no-build --verbosity normal

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: SharedDesksBooking/shared-space-ui/package-lock.json
        
    - name: Install dependencies
      working-directory: SharedDesksBooking/shared-space-ui
      run: npm install
      
    - name: Build
      working-directory: SharedDesksBooking/shared-space-ui
      run: npm run build
